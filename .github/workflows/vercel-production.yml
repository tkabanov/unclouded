name: Vercel Production

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "vercel.json"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_HATZsePr2Z9cAZQkSA2ew4Mp
      VERCEL_PROJECT_ID: prj_vHkpsXpUTFtD6rznQRlTOlfBro8z
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        env:
          VITE_SUPABASE_URL: https://szkextipgpupqoppccoy.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_Jw-QnNaUMp_eUpDLH1a6BQ_8gz3i9BM
          VITE_APP_URL: https://uncloud360.vercel.app
          VITE_PROMPT_TEST_SUPABASE_URL: https://szkextipgpupqoppccoy.supabase.co
          VITE_PROMPT_TEST_SUPABASE_PUBLISHABLE_KEY: sb_publishable_Jw-QnNaUMp_eUpDLH1a6BQ_8gz3i9BM
          VITE_PROMPT_TEST_CHAT_FUNCTION: chat-staging
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST || 'https://us.i.posthog.com' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
